name: Build AFS Portfolio

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "src/**"
      - "public/**"
      - "index.html"
      - "vite.config.ts"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/build-afs-portfolio.yml"

permissions:
  contents: write

jobs:
  build:
    name: Build static AFS bundle
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    env:
      BASE_PATH: "./"
      PORT: "5000"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm 11.12.0
        uses: pnpm/action-setup@v4
        with:
          version: "11.12.0"
          run_install: false

      - name: Install Node.js 24.16.0
        uses: actions/setup-node@v4
        with:
          node-version: "24.16.0"
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"

      - name: Confirm exact tool versions
        run: |
          node --version
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build portfolio
        run: pnpm build

      - name: Verify deploy files
        run: |
          test -f dist/public/index.html
          test -d dist/public/assets
          grep -q 'src="./assets/' dist/public/index.html
          ! grep -q 'src="/assets/' dist/public/index.html
          ! grep -q 'src="/src/main.tsx' dist/public/index.html

      - name: Save AFS-ready site
        uses: actions/upload-artifact@v4
        with:
          name: afs-portfolio
          path: dist/public
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 14

      - name: Publish site to afs-deploy branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist/public
          publish_branch: afs-deploy
          force_orphan: true
