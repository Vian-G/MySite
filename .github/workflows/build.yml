name: Build portfolio

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile 
      - run: pnpm --dir artifacts/vian-garg-portfolio run build

      - uses: actions/upload-artifact@v4
        with:
          name: portfolio-dist
          path: artifacts/vian-garg-portfolio/dist
